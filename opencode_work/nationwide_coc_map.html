const map = L.map('map',{zoomControl:false,attributionControl:false}).setView([39,-98],4.5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

let totalPit=0, totalCoc=0, totalGap=0;

stateData.forEach(s=>{
  totalPit += s.pit_count || 0;
  totalCoc += s.coc_funding || 0;
  totalGap += s.gap || 0;

  const radius = Math.max(4, Math.min(40, Math.sqrt(s.pit_count||1) * 0.4));
  const color = s.coc_funding > 0 ? '#ff4455' : '#ffaa00';
  const fundingLabel = s.coc_funding > 0 ? ` COC $${(s.coc_funding/1e6).toFixed(0)}M` : '';
  
  L.circleMarker([s.lat, s.lng], {
    radius, color, fillColor: color, fillOpacity: 0.35, weight: 1, opacity: 0.7
  }).addTo(map).bindTooltip(
    `<b>${s.state}</b><br>PIT: ${(s.pit_count||0).toLocaleString()}<br>CPS est: ${(s.cps_est||0).toLocaleString()}<br>GAP: ${(s.gap||0).toLocaleString()}${fundingLabel}`,
    {direction:'top',className:'parcel-label',offset:[0,-4]}
  ).bindPopup(
    `<div style="font-family:monospace;font-size:11px;color:#ccc">
      <b style="color:${color}">${s.state} â€” ${s.coc_name||'No COC'}</b><br>

      Sheltered: ${(s.sheltered||0).toLocaleString()}<br>
      Unsheltered: ${(s.unsheltered||0).toLocaleString()}<br>
      CPS est: ${(s.cps_est||0).toLocaleString()}<br>
      <b style="color:#f44">GAP: ${(s.gap||0).toLocaleString()}</b><br>
      COC Funding: $${((s.coc_funding||0)/1e6).toFixed(0)}M
    </div>`
  );

  if (s.coc_funding > 0) {
    L.circle([s.lat, s.lng], {
      radius: radius * 1.6, color: '#f00', weight: 0.5, fillColor: 'transparent', dashArray: '2,4', opacity: 0.5
    }).addTo(map);
  }
});

document.getElementById('total-coc').innerHTML = `COC Funding: <b>$${(totalCoc/1e9).toFixed(1)}B</b>`;
