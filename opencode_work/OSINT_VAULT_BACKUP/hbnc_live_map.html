<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBNC Live Satellite Map — 17631 Cameron Lane, Huntington Beach CA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #111; color: #fff; height: 100vh; display: flex; flex-direction: column; }
    #header { background: #1a1a2e; padding: 10px 20px; border-bottom: 2px solid #e63946; }
    #header h1 { font-size: 16px; color: #e63946; }
    #header p  { font-size: 12px; color: #aaa; margin-top: 2px; }
    #map { flex: 1; width: 100%; }
    #controls { background: #1a1a2e; padding: 8px 20px; display: flex; gap: 12px; flex-wrap: wrap; }
    .btn { background: #e63946; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn:hover { background: #c1121f; }
    .btn.secondary { background: #333; }
    .btn.secondary:hover { background: #555; }
  </style>
</head>
<body>
  <div id="header">
    <h1>HBNC SITE — LIVE SATELLITE MAP</h1>
    <p>17631 Cameron Lane, Huntington Beach CA 92647 &nbsp;|&nbsp; 33.7064°N, -117.9882°W &nbsp;|&nbsp; © 2026 Google / Maxar Technologies</p>
  </div>
  <div id="map"></div>
  <div id="controls">
    <button class="btn" onclick="setZoom(19)">Max Zoom (19)</button>
    <button class="btn secondary" onclick="setZoom(17)">Neighborhood (17)</button>
    <button class="btn secondary" onclick="setZoom(15)">District (15)</button>
    <button class="btn secondary" onclick="map.setMapTypeId('satellite')">Satellite</button>
    <button class="btn secondary" onclick="map.setMapTypeId('hybrid')">Hybrid (Labels)</button>
    <button class="btn secondary" onclick="map.setMapTypeId('roadmap')">Street Map</button>
  </div>

  <script>
    var map;
    var hbnc = { lat: 33.7064036, lng: -117.9881801 };

    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: hbnc,
        zoom: 19,
        mapTypeId: 'satellite',
        tilt: 0,
        mapTypeControl: true,
        streetViewControl: true,
        fullscreenControl: true,
      });

      var marker = new google.maps.Marker({
        position: hbnc,
        map: map,
        title: 'HBNC — 17631 Cameron Lane',
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 10,
          fillColor: '#e63946',
          fillOpacity: 1,
          strokeColor: '#fff',
          strokeWeight: 2,
        }
      });

      var infoWindow = new google.maps.InfoWindow({
        content: '<div style="color:#000;max-width:280px;">' +
          '<strong style="color:#e63946;">HBNC — Evidence Target</strong><br>' +
          '17631 Cameron Lane, Huntington Beach CA 92647<br>' +
          '<small>Hexavalent Chromium + Arsenic contamination zone.<br>' +
          'CEQA Class 1 Emergency Exemption fraudulently filed.<br>' +
          '$2.2M RPM Modular contract. Operator: Mercy House.</small>' +
          '</div>'
      });

      marker.addListener('click', function() {
        infoWindow.open(map, marker);
      });

      infoWindow.open(map, marker);
    }

    function setZoom(z) { map.setZoom(z); }
  </script>
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCwogtmoHKuJaYKfZS0IWXKt3pScdIYG6o&callback=initMap">
  </script>
</body>
</html>
