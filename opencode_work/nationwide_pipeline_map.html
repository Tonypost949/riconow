// Draw pipeline flows from DC
Object.entries(PIPELINES).forEach(([key,p])=>{
  // Agency marker
  const aIcon = L.divIcon({html:`<div style="color:${p.color};font-size:11px;font-weight:bold;text-shadow:0 0 6px ${p.color};background:rgba(0,0,0,0.7);padding:1px 6px;border-radius:3px">${p.agency}</div>`,iconSize:[120,14],iconAnchor:[60,7]});
  L.marker(p.from.slice().reverse(),{icon:aIcon,interactive:false}).addTo(map);
  
  // Flow lines to HUD states
  (p.states||[]).forEach(st=>{
    L.polyline([p.from.slice().reverse(),st],{color:p.color,weight:0.5,opacity:0.25,dashArray:'4,8'}).addTo(map);
  });

  // Specific vectors
  (p.vectors||[]).forEach(([lat,lng,label])=>{
    const l = L.polyline([p.from.slice().reverse(),[lat,lng]],{color:p.color,weight:1.5,opacity:0.6}).addTo(map);
    l.bindTooltip(`${p.label}: ${label}`,{className:'parcel-label'});
    // Arrow head circle at destination
    L.circleMarker([lat,lng],{radius:4,color:p.color,fillColor:p.color,fillOpacity:0.8,weight:1}).addTo(map);
  });
});

// CPS layer markers  
CPSDATA.forEach(c=>{
  if(!c.lat||!c.lng) return;
  const color = c.layer==='CHILD_DEATH'?'#f44':c.layer==='TRAFFICKING'?'#f0f':c.layer==='COVID_FRAUD'?'#fc0':'#f80';
  L.circleMarker([c.lat,c.lng],{radius:8,color,fillColor:color,fillOpacity:0.5,weight:2}).addTo(map)
    .bindTooltip(`<b style="color:${color}">${c.entity}</b><br>${c.status}`,{direction:'right',className:'parcel-label'})
    .bindPopup(`<div style="font-family:monospace;font-size:10px;color:#ccc"><b style="color:${color}">${c.layer}</b><br>${c.entity}<br>${c.role}<br>Children: ${c.children_affected}<br>Status: ${c.status}</div>`);
});
