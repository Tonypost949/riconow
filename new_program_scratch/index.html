<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoWingman — Free AI Developer Companion</title>
    <!-- Modern Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Marked.js for markdown rendering and Highlight.js for code syntax highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d0f1a 0%, #07080f 100%);
            --glass-bg: rgba(15, 18, 36, 0.45);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-border-focus: rgba(0, 255, 150, 0.3);
            --accent-glow: radial-gradient(circle at 50% 50%, rgba(0, 255, 150, 0.15) 0%, transparent 60%);
            --primary: #00ff96;
            --primary-glow: rgba(0, 255, 150, 0.4);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --sidebar-width: 280px;
            --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-sans);
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background glow elements */
        body::before {
            content: '';
            position: absolute;
            top: -10%;
            right: -10%;
            width: 50vw;
            height: 50vh;
            background: radial-gradient(circle, rgba(0, 255, 150, 0.08) 0%, rgba(0, 100, 255, 0.05) 50%, transparent 100%);
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 50vw;
            height: 50vh;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.08) 0%, rgba(0, 255, 150, 0.03) 50%, transparent 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* Layout */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            z-index: 1;
            backdrop-filter: blur(20px);
        }

        /* Sidebar Style */
        aside {
            width: var(--sidebar-width);
            background: rgba(8, 10, 21, 0.7);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), #00bcff);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #05070a;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text span {
            color: var(--primary);
            font-size: 0.8rem;
            vertical-align: super;
            margin-left: 2px;
        }

        .new-chat-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        .new-chat-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(0, 255, 150, 0.15);
            background: rgba(0, 255, 150, 0.05);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .history-item:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
        }

        .history-item.active {
            color: var(--primary);
            background: rgba(0, 255, 150, 0.05);
            border-color: rgba(0, 255, 150, 0.15);
        }

        .history-item .delete-chat-btn {
            opacity: 0;
            cursor: pointer;
            background: none;
            border: none;
            color: #ef4444;
            transition: opacity 0.2s ease;
        }

        .history-item:hover .delete-chat-btn {
            opacity: 1;
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .settings-btn:hover {
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        /* Main Chat Container */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        header {
            height: 70px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            background: rgba(8, 10, 21, 0.3);
        }

        .model-selector-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        select:focus {
            border-color: var(--primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .api-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .api-status.connected {
            color: var(--primary);
            background: rgba(0, 255, 150, 0.1);
            border-color: rgba(0, 255, 150, 0.2);
        }

        /* Messages Space */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .welcome-view {
            max-width: 650px;
            margin: auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }

        .welcome-view h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-view p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .suggestion-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .suggestion-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .suggestion-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            background: rgba(0, 255, 150, 0.02);
        }

        .suggestion-card h4 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .suggestion-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.4;
        }

        /* Individual message bubble styles */
        .message {
            display: flex;
            gap: 16px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.model {
            align-self: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .message.model .avatar {
            background: linear-gradient(135deg, rgba(0, 255, 150, 0.2), rgba(0, 188, 255, 0.2));
            border: 1px solid var(--primary);
            color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 150, 0.1);
        }

        .message-content {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.95rem;
            color: var(--text-main);
            overflow-x: auto;
        }

        .message.user .message-content {
            background: rgba(0, 255, 150, 0.05);
            border-color: rgba(0, 255, 150, 0.15);
        }

        /* Message Formatting Rules */
        .message-content p {
            margin-bottom: 12px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content pre {
            margin: 14px 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .message-content code {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .message-content pre code {
            padding: 16px;
            display: block;
            overflow-x: auto;
            background: #0d0e15;
        }

        .code-header {
            background: #141622;
            padding: 8px 16px;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
            font-size: 0.8rem;
        }

        .copy-btn:hover {
            color: var(--primary);
        }

        /* Input Block */
        .input-area {
            padding: 20px 30px;
            background: rgba(8, 10, 21, 0.4);
            border-top: 1px solid var(--glass-border);
        }

        .input-wrapper {
            max-width: 800px;
            margin: auto;
            position: relative;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 150, 0.1);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            color: var(--text-main);
            padding: 16px;
            font-size: 0.95rem;
            min-height: 56px;
            max-height: 200px;
            line-height: 1.5;
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
        }

        .footer-note {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--primary);
            color: #05070a;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .send-btn:hover {
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-1px);
        }

        .send-btn:disabled {
            background: var(--glass-bg);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Typing indicator animation */
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 4px 8px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* Settings Overlay/Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 7, 15, 0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: rgba(13, 16, 32, 0.95);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-group input, .form-group textarea {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary);
        }

        .help-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .help-text a {
            color: var(--primary);
            text-decoration: none;
        }

        .help-text a:hover {
            text-decoration: underline;
        }

        .save-settings-btn {
            background: var(--primary);
            color: #05070a;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        .save-settings-btn:hover {
            box-shadow: 0 0 15px var(--primary-glow);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside>
            <div class="logo-area">
                <div class="logo-icon">Ω</div>
                <div class="logo-text">NeoWingman<span>free</span></div>
            </div>

            <button class="new-chat-btn" id="new-chat-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Session
            </button>

            <div class="history-list" id="history-list">
                <!-- Stored chats auto-populate here -->
            </div>

            <button class="settings-btn" id="settings-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Gemini Settings
            </button>
        </aside>

        <!-- Main Workspace -->
        <main>
            <header>
                <div class="model-selector-wrapper">
                    <select id="model-select">
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash (Recommended - Fastest)</option>
                        <option value="gemini-2.5-pro">Gemini 2.5 Pro (Deep reasoning)</option>
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash (Highly Reliable)</option>
                    </select>
                </div>

                <div class="header-actions">
                    <div class="api-status" id="api-status-badge">
                        <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:currentColor"></span>
                        <span id="api-status-text">Key Required</span>
                    </div>
                </div>
            </header>

            <!-- Chat screen -->
            <div class="chat-area" id="chat-area">
                <!-- Dynamic chats or welcome view will be placed here -->
            </div>

            <!-- Input area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="chat-input" placeholder="Type a message or press Shift + Enter for new lines..." rows="1"></textarea>
                    <div class="input-footer">
                        <span class="footer-note">Direct free-tier Gemini API client wrapper. No servers, completely private.</span>
                        <button class="send-btn" id="send-btn" disabled>
                            <span>Send</span>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">API Settings</h3>
                <button class="close-btn" id="close-modal-btn">&times;</button>
            </div>
            
            <div class="form-group">
                <label for="api-key-input">Gemini API Key</label>
                <input type="password" id="api-key-input" placeholder="AIzaSy...">
                <p class="help-text">
                    Don't have an API key? You can get one 100% free with massive limits from 
                    <a href="https://aistudio.google.com/" target="_blank" rel="noopener noreferrer">Google AI Studio</a>.
                </p>
            </div>

            <div class="form-group">
                <label for="system-instruction-input">System Instructions</label>
                <textarea id="system-instruction-input" rows="4" placeholder="You are a brilliant senior software engineer and cybersecurity expert..."></textarea>
                <p class="help-text">
                    Define the rules, tone, and character for the AI companion.
                </p>
            </div>

            <button class="save-settings-btn" id="save-settings-btn">Apply & Connect</button>
        </div>
    </div>

    <!-- Client-side Logic -->
    <script>
        // Set marked options
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        const state = {
            apiKey: localStorage.getItem('gemini_api_key') || '',
            systemInstruction: localStorage.getItem('gemini_system_instruction') || 'You are a brilliant software engineer, cybersecurity specialist, and forensic OSINT expert. Provide clean, correct, and premium quality solution scripts, architectures, and strategies. Be structured, exact, and concise.',
            activeSessionId: null,
            sessions: JSON.parse(localStorage.getItem('gemini_sessions') || '[]'),
            currentModel: 'gemini-2.5-flash',
            isLoading: false
        };

        // DOM elements
        const chatArea = document.getElementById('chat-area');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model-select');
        const apiStatusBadge = document.getElementById('api-status-badge');
        const apiStatusText = document.getElementById('api-status-text');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const apiKeyInput = document.getElementById('api-key-input');
        const systemInstructionInput = document.getElementById('system-instruction-input');
        const saveSettingsBtn = document.getElementById('save-settings-btn');
        const historyList = document.getElementById('history-list');
        const newChatBtn = document.getElementById('new-chat-btn');

        // Initial setup
        function init() {
            apiKeyInput.value = state.apiKey;
            systemInstructionInput.value = state.systemInstruction;
            
            updateApiStatus();
            renderHistory();
            
            if (state.sessions.length > 0) {
                loadSession(state.sessions[0].id);
            } else {
                showWelcome();
            }

            // Auto-resize input textarea
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
        }

        function updateApiStatus() {
            if (state.apiKey) {
                apiStatusBadge.classList.add('connected');
                apiStatusText.textContent = 'API Ready';
                sendBtn.disabled = false;
            } else {
                apiStatusBadge.classList.remove('connected');
                apiStatusText.textContent = 'Key Required';
                sendBtn.disabled = true;
            }
        }

        function showWelcome() {
            state.activeSessionId = null;
            chatArea.innerHTML = `
                <div class="welcome-view">
                    <h1>NeoWingman</h1>
                    <p>Welcome to your high-end, completely private developer sandbox and local AI workspace. Enter your free-tier Gemini API key to query high-powered models directly with zero middleware.</p>
                    
                    <div class="suggestion-cards">
                        <div class="suggestion-card" onclick="triggerSuggestion('Write a clean Python script to parse a directory of forensic logs and extract email addresses')">
                            <h4>Forensic Parser</h4>
                            <p>Write a clean Python script to parse a directory of forensic logs and extract email addresses.</p>
                        </div>
                        <div class="suggestion-card" onclick="triggerSuggestion('Design a premium dark mode UI component with glassmorphism effects')">
                            <h4>Premium CSS UI</h4>
                            <p>Design a premium dark mode UI component with glassmorphism effects.</p>
                        </div>
                        <div class="suggestion-card" onclick="triggerSuggestion('How can I safely connect and fetch files from an external workspace using python')">
                            <h4>Workspace Code</h4>
                            <p>How can I safely connect and fetch files from an external workspace using Python.</p>
                        </div>
                        <div class="suggestion-card" onclick="triggerSuggestion('Create a robust .bat script to auto-commit and push code to git every 30 minutes')">
                            <h4>Automated Sync</h4>
                            <p>Create a robust script to auto-commit and push code to git every 30 minutes.</p>
                        </div>
                    </div>
                </div>
            `;
            
            // Remove active classes in sidebar
            document.querySelectorAll('.history-item').forEach(item => item.classList.remove('active'));
        }

        function triggerSuggestion(text) {
            if (!state.apiKey) {
                openModal();
                return;
            }
            chatInput.value = text;
            chatInput.dispatchEvent(new Event('input'));
            sendMessage();
        }

        // Render sessions in sidebar
        function renderHistory() {
            historyList.innerHTML = '';
            state.sessions.forEach(session => {
                const item = document.createElement('div');
                item.className = `history-item ${session.id === state.activeSessionId ? 'active' : ''}`;
                item.innerHTML = `
                    <span style="overflow: hidden; text-overflow: ellipsis;">${escapeHtml(session.title)}</span>
                    <button class="delete-chat-btn" onclick="deleteSession(event, '${session.id}')">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 3 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                `;
                item.addEventListener('click', () => loadSession(session.id));
                historyList.appendChild(item);
            });
        }

        function loadSession(id) {
            state.activeSessionId = id;
            const session = state.sessions.find(s => s.id === id);
            if (!session) return;

            renderHistory();
            
            chatArea.innerHTML = '';
            session.messages.forEach(msg => {
                appendMessageToUI(msg.role, msg.content);
            });
            
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function createNewSession(firstMessageText) {
            const id = 'session_' + Date.now();
            const title = firstMessageText.substring(0, 30) + (firstMessageText.length > 30 ? '...' : '');
            const newSession = {
                id,
                title,
                messages: []
            };
            state.sessions.unshift(newSession);
            state.activeSessionId = id;
            saveSessions();
            renderHistory();
            return newSession;
        }

        function deleteSession(event, id) {
            event.stopPropagation();
            state.sessions = state.sessions.filter(s => s.id !== id);
            saveSessions();
            
            if (state.activeSessionId === id) {
                if (state.sessions.length > 0) {
                    loadSession(state.sessions[0].id);
                } else {
                    showWelcome();
                }
            } else {
                renderHistory();
            }
        }

        function saveSessions() {
            localStorage.setItem('gemini_sessions', JSON.stringify(state.sessions));
        }

        function appendMessageToUI(role, content) {
            // Remove welcome view if present
            const welcome = chatArea.querySelector('.welcome-view');
            if (welcome) welcome.remove();

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'user' : 'model'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? 'U' : 'AI';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (role === 'model') {
                contentDiv.innerHTML = marked.parse(content);
                addCodeFormattingAndCopy(contentDiv);
            } else {
                contentDiv.textContent = content;
            }
            
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(contentDiv);
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addCodeFormattingAndCopy(container) {
            // Find all pre elements
            const pres = container.querySelectorAll('pre');
            pres.forEach(pre => {
                const code = pre.querySelector('code');
                if (!code) return;
                
                // Extract language
                let lang = 'code';
                code.classList.forEach(cls => {
                    if (cls.startsWith('language-')) {
                        lang = cls.replace('language-', '');
                    }
                });

                // Create nice code wrapper
                const header = document.createElement('div');
                header.className = 'code-header';
                header.innerHTML = `
                    <span>${lang.toUpperCase()}</span>
                    <button class="copy-btn">Copy code</button>
                `;

                // Set event listener on copy button
                header.querySelector('.copy-btn').addEventListener('click', function() {
                    navigator.clipboard.writeText(code.textContent).then(() => {
                        this.textContent = 'Copied!';
                        setTimeout(() => this.textContent = 'Copy code', 2000);
                    });
                });

                pre.insertBefore(header, pre.firstChild);
            });
        }

        // Send action
        async function sendMessage() {
            const content = chatInput.value.trim();
            if (!content || state.isLoading || !state.apiKey) return;

            state.isLoading = true;
            chatInput.value = '';
            chatInput.style.height = 'auto';
            sendBtn.disabled = true;

            // Ensure active session
            let session = state.sessions.find(s => s.id === state.activeSessionId);
            if (!session) {
                session = createNewSession(content);
            }

            // Append user message
            session.messages.push({ role: 'user', content });
            appendMessageToUI('user', content);
            saveSessions();

            // Append loader typing bubble
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message model';
            loadingDiv.id = 'temp-loader';
            loadingDiv.innerHTML = `
                <div class="avatar">AI</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatArea.appendChild(loadingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                // Call Gemini API directly
                const apiModel = modelSelect.value;
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${apiModel}:generateContent?key=${state.apiKey}`;
                
                // Formulate system and message history payload
                const contents = [];
                
                // Load messages from current session
                session.messages.forEach(msg => {
                    contents.push({
                        role: msg.role === 'user' ? 'user' : 'model',
                        parts: [{ text: msg.content }]
                    });
                });

                const payload = {
                    contents: contents,
                    systemInstruction: {
                        parts: [{ text: state.systemInstruction }]
                    },
                    generationConfig: {
                        temperature: 0.7,
                        maxOutputTokens: 8192
                    }
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                // Remove loader
                document.getElementById('temp-loader').remove();

                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    const reply = data.candidates[0].content.parts[0].text;
                    session.messages.push({ role: 'model', content: reply });
                    appendMessageToUI('model', reply);
                    saveSessions();
                } else if (data.error) {
                    appendMessageToUI('model', `**Error from Gemini API:** ${data.error.message || 'Unknown API Error'}`);
                } else {
                    appendMessageToUI('model', 'Failed to generate response. Please check your network and API key.');
                }

            } catch (err) {
                console.error(err);
                const loader = document.getElementById('temp-loader');
                if (loader) loader.remove();
                appendMessageToUI('model', `**Network Error:** Failed to communicate with the API. Details: ${err.message}`);
            } finally {
                state.isLoading = false;
                sendBtn.disabled = false;
            }
        }

        // Modal triggers
        function openModal() { settingsModal.classList.add('show'); }
        function closeModal() { settingsModal.classList.remove('show'); }

        settingsBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) closeModal();
        });

        saveSettingsBtn.addEventListener('click', () => {
            state.apiKey = apiKeyInput.value.trim();
            state.systemInstruction = systemInstructionInput.value.trim() || 'You are a helpful assistant.';
            
            localStorage.setItem('gemini_api_key', state.apiKey);
            localStorage.setItem('gemini_system_instruction', state.systemInstruction);
            
            updateApiStatus();
            closeModal();
        });

        newChatBtn.addEventListener('click', showWelcome);

        // Key bindings
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Initialize!
        init();
    </script>
</body>
</html>
