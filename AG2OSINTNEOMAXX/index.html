*{margin:0;padding:0;box-sizing:border-box}
html,body,#map{width:100%;height:100%;background:#000;font-family:monospace;overflow:hidden}

#hud{position:fixed;top:8px;left:8px;z-index:1000;font-family:monospace;font-size:9px;color:#aaa;line-height:1.5;pointer-events:none}
#hud b{color:#0f0}#hud .r{color:#f44}.c{color:#0ff}.y{color:#fc0}.p{color:#f0f}

/* STATS PANEL */
#stats{position:fixed;top:8px;right:8px;z-index:1000;background:rgba(0,0,0,0.82);border:1px solid rgba(0,255,0,0.12);border-radius:6px;font-family:monospace;color:#aaa;padding:10px 12px;font-size:9px;line-height:1.7;width:220px;backdrop-filter:blur(8px)}
#stats b{color:#fff}
#stats .bar{display:inline-block;height:3px;vertical-align:middle;border-radius:2px;margin-right:4px}

/* LEGEND */
#legend{position:fixed;bottom:8px;left:8px;z-index:1000;background:rgba(0,0,0,0.78);border:1px solid rgba(255,255,255,0.06);border-radius:6px;font-family:monospace;font-size:9px;color:#888;padding:8px 12px;line-height:2;backdrop-filter:blur(8px)}
#legend .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle}
#legend .dash{display:inline-block;width:12px;height:0;border-top:1.5px dashed;margin-right:3px;vertical-align:middle}

/* LAYER TOGGLES */
#toggles{position:fixed;bottom:8px;right:8px;z-index:1000;display:flex;flex-wrap:wrap;gap:4px;max-width:320px}
#toggles button{background:rgba(0,0,0,0.7);color:#666;border:1px solid rgba(255,255,255,0.08);padding:3px 7px;font-size:8px;border-radius:3px;cursor:pointer;font-family:monospace;transition:all .2s;white-space:nowrap}
#toggles button.on{color:#fff;border-color:rgba(255,255,255,0.3)}
#toggles button:hover{color:#0f0;border-color:rgba(0,255,0,0.3)}

#search{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2000;display:none}
#search.show{display:block}
#search input{background:rgba(0,0,0,0.9);color:#0f0;border:1px solid rgba(0,255,0,0.3);padding:8px 14px;font-size:12px;font-family:monospace;width:300px;border-radius:4px}
#search input:focus{outline:none;border-color:#0f0}

#search .results div:hover{background:rgba(0,60,0,0.3);color:#0f0}

.rf{color:#f44}.cf{color:#0ff}.yf{color:#fc0}.pf{color:#f0f}.gf{color:#0f0}

.leaflet-tooltip.parcel-label{background:rgba(0,0,0,0.85);border:1px solid rgba(0,255,0,0.15);color:#0f0;font-size:9px;font-family:monospace;padding:2px 6px;border-radius:2px}

.leaflet-popup-tip{background:rgba(0,0,0,0.92)}

function doSearch(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const results=document.getElementById('search-results');
  results.innerHTML='';
  if(!q||q.length<2)return;
  const matches=allSearchable.filter(i=>(i.name+i.desc+i.type).toLowerCase().includes(q)).slice(0,15);
  matches.forEach(m=>{
    const d=document.createElement('div');
    d.innerHTML=`<b>${m.type}</b> ${m.name}<br><small>${m.desc.substring(0,60)}</small>`;
    d.onclick=()=>{map.setView([m.lat,m.lng],m.type==='STATE'?6:15);document.getElementById('search').classList.remove('show');};
    results.appendChild(d);
  });
}

function threatMode(){
  threatActive=!threatActive;
  const color=threatActive?'#f00':'#f44';
  document.querySelectorAll('.leaflet-interactive').forEach(el=>{
    if(el._path&&el._path.classList){el.setAttribute('stroke',color);}
  });
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.key==='f'&&e.ctrlKey){e.preventDefault();document.getElementById('search').classList.toggle('show');document.getElementById('search-input').focus();}
  if(e.key==='t'&&e.ctrlKey){e.preventDefault();threatMode();}
  if(e.key==='Escape'){document.getElementById('search').classList.remove('show');}
});
