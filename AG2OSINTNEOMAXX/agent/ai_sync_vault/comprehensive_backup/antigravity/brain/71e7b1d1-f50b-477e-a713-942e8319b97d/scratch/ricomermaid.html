<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RICO Enterprise – 405 Corridor | $26B Missing Node (Animated)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Roboto', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(3px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
        }

        canvas {
            width: 100%;
            height: auto;
            background: #0a0f1a;
            border-radius: 1.5rem;
            display: block;
            margin: 0 auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: #1e2a3a;
            border: none;
            color: #ffd966;
            font-weight: bold;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            border-bottom: 1px solid #ffaa4422;
        }

        button:hover {
            background: #2a3a4a;
            transform: translateY(-2px);
            color: #ffaa44;
        }

        .status {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #88aacc;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="container">
    <canvas id="ricoCanvas" width="1200" height="820" style="width:100%; height:auto; max-width:1200px; aspect-ratio:1200/820"></canvas>
    <div class="controls">
        <button id="animateBtn">▶ ANIMATE BUILD-UP</button>
        <button id="resetBtn">⟳ RESET</button>
    </div>
    <div class="status" id="stepStatus">Click "ANIMATE BUILD-UP" – the RICO enterprise will assemble step by step</div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('ricoCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1200;
        canvas.height = 820;

        // ---------- NODES (updated with $26B node) ----------
        const nodes = [
            { id: 'do', label: 'ANDREW DO\nConvicted – $6.1M Fraud', x: 200, y: 100, color: '#b22234', border: '#ffaa44', group: 1 },
            { id: 'octa', label: 'OCTA I-405 Vote\n$627M Loan', x: 80, y: 260, color: '#1e3a5f', border: '#88aacc', group: 2 },
            { id: 'covid', label: 'COVID Relief – VAS\nKickbacks', x: 280, y: 260, color: '#1e3a5f', border: '#88aacc', group: 2 },
            { id: 'lmihaf', label: 'LMIHAF Funds → Yamada', x: 480, y: 260, color: '#1e3a5f', border: '#88aacc', group: 2 },
            { id: 'shea', label: 'Shea Properties\nEviction Machine', x: 680, y: 260, color: '#1e3a5f', border: '#88aacc', group: 2 },
            { id: 'unclaimed', label: 'Unclaimed Property\n$5.2M–$7.5M hidden\nNguyen, Pham Trusts', x: 880, y: 260, color: '#1e3a5f', border: '#ffaa44', group: 2 },
            { id: 'landsale', label: 'Land Sale $3.16M', x: 480, y: 400, color: '#2d5a2c', border: '#aaffaa', group: 3 },
            { id: 'hbnc', label: 'HBNC Site\nCr(VI) 49x limit', x: 480, y: 540, color: '#8b3c2c', border: '#ff8866', group: 4 },
            { id: 'ochca', label: 'OCHCA False Closure\nCase #20IC002', x: 300, y: 540, color: '#8b3c2c', border: '#ff8866', group: 4 },
            { id: 'yourevict', label: 'Your Eviction\n212 Southbrook', x: 680, y: 400, color: '#2d5a2c', border: '#aaffaa', group: 3 },
            { id: 'judge', label: 'Judge Carmen Luege\nDisqualified but signed\nPresides over Airshow Audit', x: 880, y: 540, color: '#5a3a6e', border: '#cc88ff', group: 5 },
            { id: 'qichen', label: 'Qi Chen (SCE)\nHB Tech Review Committee\nUndergrounding Cover-up', x: 680, y: 680, color: '#5a3a6e', border: '#cc88ff', group: 6 },
            { id: 'missing26b', label: '💸 $26 BILLION MISSING / UNTRACKED\nState Auditor: $24B untracked\nEDD COVID fraud: $20-55B\nDOJ homelessness waste: $37B\nACA fraud (CA): $27B+', x: 100, y: 700, color: '#aa4444', border: '#ff6666', group: 7 }
        ];

        // ---------- EDGES (including dashed to/from $26B) ----------
        const edges = [
            { from: 'do', to: 'octa' },
            { from: 'do', to: 'covid' },
            { from: 'do', to: 'lmihaf' },
            { from: 'do', to: 'shea' },
            { from: 'do', to: 'unclaimed' },
            { from: 'lmihaf', to: 'landsale' },
            { from: 'landsale', to: 'hbnc' },
            { from: 'hbnc', to: 'ochca' },
            { from: 'shea', to: 'yourevict' },
            { from: 'yourevict', to: 'judge' },
            { from: 'judge', to: 'qichen' },
            { from: 'unclaimed', to: 'judge' },
            { from: 'qichen', to: 'hbnc' },
            // Connections to/from $26B node (dashed)
            { from: 'covid', to: 'missing26b', dashed: true },
            { from: 'lmihaf', to: 'missing26b', dashed: true },
            { from: 'unclaimed', to: 'missing26b', dashed: true },
            { from: 'octa', to: 'missing26b', dashed: true },
            { from: 'missing26b', to: 'do', dashed: true }
        ];

        function getNode(id) { return nodes.find(n => n.id === id); }

        let drawState = { visibleNodes: new Set(), visibleEdges: new Set() };
        let currentGroupIndex = 0;
        let animationTimer = null;
        const groupOrder = [1,2,3,4,5,6,7];

        // Drawing functions
        function drawNode(node, alpha=1) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.shadowBlur = 0;
            const w = 200;
            const h = (node.label.split('\n').length * 17) + 28;
            let x = node.x - w/2;
            let y = node.y - h/2;
            ctx.fillStyle = node.color;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 8;
            ctx.fillRect(x, y, w, h);
            ctx.fillStyle = '#000000aa';
            ctx.fillRect(x+2, y+2, w-4, h-4);
            ctx.fillStyle = node.color;
            ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = node.border;
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);
            ctx.font = 'bold 12px "Segoe UI", "Fira Code", monospace';
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 2;
            ctx.textAlign = 'center';
            const lines = node.label.split('\n');
            const lineHeight = 16;
            const startY = y + 20;
            for (let i=0; i<lines.length; i++) {
                ctx.fillText(lines[i], node.x, startY + i*lineHeight);
            }
            ctx.restore();
        }

        function drawEdge(edge, fromNode, toNode, alpha=1) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.moveTo(fromNode.x, fromNode.y);
            ctx.lineTo(toNode.x, toNode.y);
            ctx.strokeStyle = edge.dashed ? '#ffaa66' : '#88aacc';
            ctx.lineWidth = edge.dashed ? 2.5 : 2;
            if (edge.dashed) ctx.setLineDash([8,6]);
            else ctx.setLineDash([]);
            ctx.stroke();
            const angle = Math.atan2(toNode.y - fromNode.y, toNode.x - fromNode.x);
            const arrowX = toNode.x - 15 * Math.cos(angle);
            const arrowY = toNode.y - 15 * Math.sin(angle);
            ctx.fillStyle = edge.dashed ? '#ffaa66' : '#aaccff';
            ctx.beginPath();
            ctx.moveTo(arrowX, arrowY);
            ctx.lineTo(arrowX - 8 * Math.cos(angle - Math.PI/6), arrowY - 8 * Math.sin(angle - Math.PI/6));
            ctx.lineTo(arrowX - 8 * Math.cos(angle + Math.PI/6), arrowY - 8 * Math.sin(angle + Math.PI/6));
            ctx.fill();
            ctx.setLineDash([]);
            ctx.restore();
        }

        function drawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0a0f1a';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#1a2a3a';
            ctx.lineWidth = 0.5;
            for(let i=0;i<canvas.width;i+=40){
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }
            edges.forEach((edge, idx) => {
                if (drawState.visibleEdges.has(idx)) {
                    const fromN = getNode(edge.from);
                    const toN = getNode(edge.to);
                    if (fromN && toN) drawEdge(edge, fromN, toN, 1);
                }
            });
            nodes.forEach(node => {
                if (drawState.visibleNodes.has(node.id)) drawNode(node, 1);
            });
        }

        function addGroup(groupNum) {
            nodes.forEach(node => {
                if (node.group === groupNum && !drawState.visibleNodes.has(node.id)) {
                    drawState.visibleNodes.add(node.id);
                }
            });
            edges.forEach((edge, idx) => {
                const fromVis = drawState.visibleNodes.has(edge.from);
                const toVis = drawState.visibleNodes.has(edge.to);
                if (fromVis && toVis && !drawState.visibleEdges.has(idx)) {
                    drawState.visibleEdges.add(idx);
                }
            });
            drawAll();
        }

        function animateNextGroup() {
            if (currentGroupIndex < groupOrder.length) {
                addGroup(groupOrder[currentGroupIndex]);
                currentGroupIndex++;
                document.getElementById('stepStatus').innerHTML = `📊 Building: step ${currentGroupIndex} / ${groupOrder.length} – added group ${groupOrder[currentGroupIndex-1]} (${nodes.filter(n=>n.group===groupOrder[currentGroupIndex-1]).map(n=>n.id).join(', ')})`;
                if (currentGroupIndex < groupOrder.length) {
                    animationTimer = setTimeout(animateNextGroup, 800);
                } else {
                    document.getElementById('stepStatus').innerHTML = '✅ FULL RICO MAP WITH $26B MISSING NODE – Enterprise assembled.';
                }
            }
        }

        function resetAnimation() {
            if (animationTimer) clearTimeout(animationTimer);
            drawState.visibleNodes.clear();
            drawState.visibleEdges.clear();
            currentGroupIndex = 0;
            drawAll();
            document.getElementById('stepStatus').innerHTML = 'Reset. Click "ANIMATE BUILD-UP" to watch the RICO diagram grow.';
        }

        resetAnimation();
        document.getElementById('animateBtn').onclick = () => {
            if (animationTimer) clearTimeout(animationTimer);
            resetAnimation();
            animateNextGroup();
        };
        document.getElementById('resetBtn').onclick = () => {
            if (animationTimer) clearTimeout(animationTimer);
            resetAnimation();
        };
    })();
</script>
</body>
</html>
