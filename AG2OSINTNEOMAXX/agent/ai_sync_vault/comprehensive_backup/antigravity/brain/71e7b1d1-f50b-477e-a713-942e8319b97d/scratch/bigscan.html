<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State+City Recon – All Domains</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0b0e14;
            color: #c8d0dc;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #7ab7ff; }
        .sub { color: #8895aa; margin-bottom: 20px; }
        .card {
            background: #141a24;
            border: 1px solid #1f2a3a;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 10px;
        }
        .domain { font-weight: 600; color: #7ab7ff; }
        .live { color: #4caf50; }
        .dead { color: #f44336; }
        .found { color: #ffa726; }
        .notfound { color: #4a5568; }
        .detail { font-size: 13px; color: #8895aa; }
        .badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }
        .badge.live { background: #1b3a1b; color: #4caf50; }
        .badge.dead { background: #3a1b1b; color: #f44336; }
        .log {
            background: #0b0e14;
            border: 1px solid #1f2a3a;
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            color: #6a7a8e;
            white-space: pre-wrap;
            margin-top: 16px;
        }
        .footer { margin-top: 20px; font-size: 12px; color: #4a5a6e; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔍 State + City Recon</h1>
    <div class="sub">Scanning 39 states, all CA cities, police, SCE, Turkey, and RICO entities.</div>
    <div id="results"></div>
    <div id="log" class="log">Starting scan...</div>
    <div class="footer">Uses corsproxy.io – runs entirely in your browser. Reload if timeouts occur.</div>
</div>

<script>
    (function() {
        const resultsDiv = document.getElementById('results');
        const logDiv = document.getElementById('log');

        // ---- ALL DOMAINS (39 states + all previously discussed) ----
        const allDomains = [
            // --- 39 States + DC (official .gov domains) ---
            'alabama.gov',
            'alaska.gov',
            'arizona.gov',
            'arkansas.gov',
            'ca.gov',
            'colorado.gov',
            'ct.gov',
            'delaware.gov',
            'myflorida.com',
            'georgia.gov',
            'hawaii.gov',
            'idaho.gov',
            'illinois.gov',
            'in.gov',
            'iowa.gov',
            'kansas.gov',
            'louisiana.gov',
            'michigan.gov',
            'mn.gov',
            'ms.gov',
            'nv.gov',
            'nj.gov',
            'newmexico.gov',
            'ny.gov',
            'nc.gov',
            'nd.gov',
            'ohio.gov',
            'ok.gov',
            'oregon.gov',
            'pa.gov',
            'ri.gov',
            'tn.gov',
            'texas.gov',
            'utah.gov',
            'virginia.gov',
            'wa.gov',
            'wisconsin.gov',
            'wv.gov',
            'wy.gov',
            'pr.gov',

            // --- Huntington Beach ---
            'hbpd.org',
            'huntingtonbeachca.gov',
            'volunteer.huntingtonbeachca.gov',
            'huntingtonbeachcu.org',

            // --- Newport Beach ---
            'newportbeachca.gov',
            'nbpd.org',

            // --- Santa Monica ---
            'santamonica.gov',
            'santamonicapd.org',
            'joinsmpd.com',

            // --- Irvine ---
            'cityofirvine.org',
            'irvinepd.org',
            'joinirvinepd.gov',

            // --- RICO-connected cities ---
            'sanpedroca.gov',
            'cudahyca.gov',
            'lacity.org',
            'ocgov.com',
            'orangecountyca.gov',
            'santaana.gov',
            'anaheim.net',
            'fullertoncity.com',
            'garden-grove.org',
            'lapd.org',
            'sheriff.lacounty.gov',

            // --- Southern California Edison ---
            'sce.com',
            'edison.com',

            // --- Turkey (National) ---
            'egm.gov.tr',
            'jandarma.gov.tr',
            'turkiye.gov.tr',

            // --- Turkey (Regional Police) ---
            'izmir.pol.tr',
            'duzce.pol.tr',
            'ankara.pol.tr',
            'istanbul.pol.tr'
        ];

        // ---- Common admin paths ----
        const adminPaths = [
            '/admin', '/cpanel', '/webmail', '/login', '/wp-admin',
            '/administrator', '/backup', '/temp', '/config', '/.env',
            '/phpmyadmin', '/mysql', '/server-status', '/logs', '/shell',
            '/cgi-bin', '/vendor', '/composer.json', '/package.json',
            '/.git', '/.svn', '/robots.txt', '/sitemap.xml',
            '/.htaccess', '/.aws', '/.ssh'
        ];

        const PROXY = 'https://corsproxy.io/?';

        function log(msg) {
            const ts = new Date().toLocaleTimeString();
            logDiv.textContent += `\n[${ts}] ${msg}`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function checkUrl(url) {
            try {
                const resp = await fetch(PROXY + encodeURIComponent(url), {
                    signal: AbortSignal.timeout(8000)
                });
                return { url, status: resp.status, ok: resp.ok };
            } catch {
                return { url, status: 0, ok: false };
            }
        }

        async function scanDomain(domain) {
            const start = performance.now();
            let base = 'https://' + domain;
            let main = await checkUrl(base);
            if (!main.ok) {
                base = 'http://' + domain;
                main = await checkUrl(base);
                if (!main.ok) {
                    return {
                        domain,
                        reachable: false,
                        server: 'N/A',
                        foundPaths: [],
                        elapsed: (performance.now() - start).toFixed(0)
                    };
                }
            }

            let server = 'Unknown';
            try {
                const resp = await fetch(PROXY + encodeURIComponent(base), {
                    signal: AbortSignal.timeout(8000)
                });
                server = resp.headers.get('server') || resp.headers.get('x-powered-by') || 'Unknown';
            } catch {}

            const foundPaths = [];
            for (const path of adminPaths) {
                const url = base + path;
                const res = await checkUrl(url);
                if (res.ok && res.status >= 200 && res.status < 400) {
                    foundPaths.push({ path, status: res.status });
                }
                await new Promise(r => setTimeout(r, 60));
            }

            const elapsed = (performance.now() - start).toFixed(0);
            return { domain, reachable: true, baseUrl: base, server, foundPaths, elapsed };
        }

        async function runAll() {
            log('Scanning ' + allDomains.length + ' domains...');
            let resultsHtml = '';
            let liveCount = 0, deadCount = 0;

            for (const domain of allDomains) {
                log('Scanning ' + domain + '...');
                const result = await scanDomain(domain);

                let cardHtml = '';
                if (!result.reachable) {
                    deadCount++;
                    cardHtml = `
                        <div class="card">
                            <span class="domain">${result.domain}</span>
                            <span class="badge dead">DEAD</span>
                            <div class="detail"><span class="dead">✗ Not reachable</span> – ⏱ ${result.elapsed}ms</div>
                        </div>
                    `;
                } else {
                    liveCount++;
                    let pathsHtml = '';
                    if (result.foundPaths.length > 0) {
                        pathsHtml = result.foundPaths.map(p =>
                            `<span class="found">${p.path} (${p.status})</span>`
                        ).join(' ');
                        pathsHtml = `<div class="detail"><span class="found">🔓 Exposed:</span> ${pathsHtml}</div>`;
                    } else {
                        pathsHtml = `<div class="detail"><span class="notfound">✓ No common admin paths exposed.</span></div>`;
                    }

                    cardHtml = `
                        <div class="card">
                            <span class="domain">${result.domain}</span>
                            <span class="badge live">LIVE</span>
                            <div class="detail">🖥 Server: ${result.server} – ⏱ ${result.elapsed}ms</div>
                            ${pathsHtml}
                        </div>
                    `;
                }
                resultsHtml += cardHtml;
                resultsDiv.innerHTML = resultsHtml;
                log('Done: ' + domain + ' – ' + (result.reachable ? 'LIVE' : 'DEAD'));
            }
            log('All scans complete. Live: ' + liveCount + ', Dead: ' + deadCount);
        }

        // Auto-start
        runAll();
    })();
</script>
</body>
</html>
