<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1614">
<title>chat bit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1614;
    --surface:#11201d;
    --surface-2:#15221e;
    --ink:#f4efe3;
    --ink-dim:#92a8a1;
    --accent:#e8a33d;
    --accent-dim:#5c4a28;
    --user-bubble:#1f3b35;
    --line:rgba(244,239,227,0.09);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{
    display:flex;
    flex-direction:column;
    height:100dvh;
    max-width:720px;
    margin:0 auto;
  }
  @media (min-width:760px){
    .app{border-left:1px solid var(--line); border-right:1px solid var(--line);}
  }

  .header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:16px 18px;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:9px;
    font-family:'Fraunces',Georgia,serif;
    font-size:18px;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  .pulse-dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--accent);
    animation:pulse 2.6s infinite;
    flex-shrink:0;
  }
  .pulse-dot.fast{animation-duration:0.85s;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(232,163,61,0.5);}
    70%{box-shadow:0 0 0 7px rgba(232,163,61,0);}
    100%{box-shadow:0 0 0 0 rgba(232,163,61,0);}
  }
  .status{
    margin-left:auto;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-dim);
    letter-spacing:0.02em;
  }
  .clear-btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-dim);
    padding:6px 11px;
    border-radius:8px;
    cursor:pointer;
  }
  .clear-btn:hover{border-color:var(--accent); color:var(--accent);}
  .clear-btn.armed{border-color:var(--accent); color:var(--accent);}
  .clear-btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .chat-log{
    flex:1;
    overflow-y:auto;
    padding:22px 18px;
    display:flex;
    flex-direction:column;
  }
  .chat-log::-webkit-scrollbar{width:7px;}
  .chat-log::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}

  .empty-state{
    margin:auto 0;
    text-align:center;
    padding:0 20px;
  }
  .empty-state h1{
    font-family:'Fraunces',Georgia,serif;
    font-weight:600;
    font-size:clamp(30px,7vw,44px);
    margin:0 0 8px;
  }
  .empty-state p{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    color:var(--ink-dim);
    margin:0;
    letter-spacing:0.03em;
  }

  .message{
    display:flex;
    margin-bottom:16px;
    animation:rise 0.25s ease-out;
  }
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  .message.user{justify-content:flex-end;}
  .message.assistant{justify-content:flex-start;}

  .bubble{
    max-width:78%;
    padding:12px 16px;
    border-radius:15px;
  }
  .message.user .bubble{
    background:var(--user-bubble);
    border-bottom-right-radius:4px;
  }
  .message.assistant .bubble{
    background:var(--surface);
    border:1px solid var(--line);
    border-bottom-left-radius:4px;
  }
  .bubble.error{border-left:3px solid var(--accent); padding-left:13px;}

  .bubble-text{
    font-size:15px;
    line-height:1.55;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .bubble .meta{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    color:var(--ink-dim);
    opacity:0.75;
    margin-top:7px;
    letter-spacing:0.02em;
  }
  .bubble.thinking .bubble-text{
    font-family:'IBM Plex Mono',monospace;
    color:var(--accent);
    letter-spacing:0.08em;
  }

  .retry-btn{
    display:inline-block;
    margin-top:9px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    background:transparent;
    border:1px solid var(--accent-dim);
    color:var(--accent);
    padding:5px 11px;
    border-radius:8px;
    cursor:pointer;
  }
  .retry-btn:hover{background:var(--accent); color:var(--bg);}
  .retry-btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .composer{
    display:flex;
    gap:10px;
    align-items:flex-end;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);
    background:var(--surface-2);
    flex-shrink:0;
  }
  #input{
    flex:1;
    resize:none;
    max-height:140px;
    min-height:42px;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:13px;
    padding:11px 14px;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-size:16px;
    line-height:1.4;
  }
  #input::placeholder{color:var(--ink-dim);}
  #input:focus-visible{outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent);}

  #send-btn{
    width:42px;height:42px;
    border-radius:50%;
    background:var(--accent);
    color:var(--bg);
    border:none;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex-shrink:0;
  }
  #send-btn svg{width:18px;height:18px; stroke:currentColor;}
  #send-btn:disabled{opacity:0.4; cursor:not-allowed;}
  #send-btn:focus-visible{outline:2px solid var(--ink); outline-offset:2px;}

  @media (prefers-reduced-motion:reduce){
    .pulse-dot, .message{animation:none;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand"><span class="pulse-dot" id="pulse-dot"></span>chat bit</div>
    <span class="status" id="status">online</span>
    <button type="button" class="clear-btn" id="clear-btn">clear</button>
  </header>

  <main class="chat-log" id="log" role="log" aria-live="polite" aria-label="Conversation"></main>

  <footer class="composer">
    <textarea id="input" rows="1" placeholder="send a message…" aria-label="Message"></textarea>
    <button type="button" id="send-btn" aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="19" x2="19" y2="5"></line>
        <polyline points="9 5 19 5 19 15"></polyline>
      </svg>
    </button>
  </footer>
</div>

<script>
  const SYSTEM_PROMPT = "You are Chat Bit, a sharp and friendly AI assistant. Be concise and direct, skip unnecessary hedging or preamble, and match the energy of the person you're talking to. Use plain conversational language.";

  const log = document.getElementById('log');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const statusEl = document.getElementById('status');
  const pulseDot = document.getElementById('pulse-dot');
  const clearBtn = document.getElementById('clear-btn');

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const state = { messages: [], sending: false };
  let lastErrorWrap = null;
  let clearArmed = false;
  let armTimer = null;

  function insertEmptyState(){
    const es = document.createElement('div');
    es.className = 'empty-state';
    es.innerHTML = '<h1>chat bit</h1><p>// every message, decoded</p>';
    log.appendChild(es);
  }

  function clearEmptyState(){
    const es = log.querySelector('.empty-state');
    if(es) es.remove();
  }

  function formatTime(d){
    return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  }

  function autoResize(){
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  }

  function appendMessage(role, text){
    clearEmptyState();
    const wrap = document.createElement('div');
    wrap.className = 'message ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const textEl = document.createElement('div');
    textEl.className = 'bubble-text';
    textEl.textContent = text;
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = (role === 'user' ? 'you' : 'chat bit') + ' · ' + formatTime(new Date());
    bubble.appendChild(textEl);
    bubble.appendChild(meta);
    wrap.appendChild(bubble);
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
  }

  function randomBits(n){
    let s = '';
    for(let i=0;i<n;i++) s += Math.round(Math.random());
    return s;
  }

  function appendThinking(){
    clearEmptyState();
    const wrap = document.createElement('div');
    wrap.className = 'message assistant';
    const bubble = document.createElement('div');
    bubble.className = 'bubble thinking';
    const textEl = document.createElement('div');
    textEl.className = 'bubble-text';
    textEl.textContent = reduceMotion ? '· · ·' : randomBits(8);
    bubble.appendChild(textEl);
    wrap.appendChild(bubble);
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
    let interval = null;
    if(!reduceMotion){
      interval = setInterval(() => { textEl.textContent = randomBits(8); }, 140);
    }
    return { wrap, interval };
  }

  function removeThinking(handle){
    if(handle.interval) clearInterval(handle.interval);
    handle.wrap.remove();
  }

  function appendError(){
    const wrap = document.createElement('div');
    wrap.className = 'message assistant';
    const bubble = document.createElement('div');
    bubble.className = 'bubble error';
    const msg = document.createElement('div');
    msg.className = 'bubble-text';
    msg.textContent = 'transmission failed — signal lost. check your connection and try again.';
    const retry = document.createElement('button');
    retry.type = 'button';
    retry.className = 'retry-btn';
    retry.textContent = 'retry';
    retry.addEventListener('click', () => {
      wrap.remove();
      lastErrorWrap = null;
      state.sending = true;
      sendBtn.disabled = true;
      attemptCompletion();
    });
    bubble.appendChild(msg);
    bubble.appendChild(retry);
    wrap.appendChild(bubble);
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
    lastErrorWrap = wrap;
  }

  async function attemptCompletion(){
    statusEl.textContent = 'transmitting…';
    pulseDot.classList.add('fast');
    const thinking = appendThinking();
    try{
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: state.messages.map(m => ({ role: m.role, content: m.content }))
        })
      });
      if(!response.ok) throw new Error('status ' + response.status);
      const data = await response.json();
      const reply = (data.content || [])
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('\n')
        .trim() || '…';
      removeThinking(thinking);
      state.messages.push({ role: 'assistant', content: reply });
      appendMessage('assistant', reply);
      statusEl.textContent = 'online';
    } catch(err){
      removeThinking(thinking);
      appendError();
      statusEl.textContent = 'signal lost';
    } finally {
      state.sending = false;
      sendBtn.disabled = false;
      pulseDot.classList.remove('fast');
    }
  }

  async function sendMessage(){
    const text = input.value.trim();
    if(!text || state.sending) return;
    if(lastErrorWrap){ lastErrorWrap.remove(); lastErrorWrap = null; }
    state.sending = true;
    sendBtn.disabled = true;
    input.value = '';
    autoResize();
    state.messages.push({ role: 'user', content: text });
    appendMessage('user', text);
    await attemptCompletion();
    input.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('input', autoResize);
  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });

  clearBtn.addEventListener('click', () => {
    if(!clearArmed){
      clearArmed = true;
      clearBtn.textContent = 'sure?';
      clearBtn.classList.add('armed');
      armTimer = setTimeout(() => {
        clearArmed = false;
        clearBtn.textContent = 'clear';
        clearBtn.classList.remove('armed');
      }, 2500);
      return;
    }
    clearTimeout(armTimer);
    clearArmed = false;
    clearBtn.textContent = 'clear';
    clearBtn.classList.remove('armed');
    state.messages = [];
    log.innerHTML = '';
    insertEmptyState();
    statusEl.textContent = 'online';
  });

  insertEmptyState();
  autoResize();
  input.focus();
</script>
</body>
</html>
