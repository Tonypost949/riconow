<!DOCTYPE html>
<html>
<head>
  <title>Recon with Proxy</title>
  <style>
    body { background: #0b0e14; color: #c8d0dc; font-family: monospace; padding: 20px; }
    .card { background: #141a24; border:1px solid #2a3344; margin:8px 0; padding:12px; border-radius:6px; }
    .live { color:#4caf50; } .dead { color:#f44336; }
    input, button { padding:8px; border-radius:4px; border:1px solid #2a3344; background:#141a24; color:#fff; }
    .log { background:#0b0e14; padding:8px; max-height:300px; overflow-y:auto; font-size:12px; white-space:pre-wrap; }
  </style>
</head>
<body>
<h1>🔍 Proxy Recon</h1>
<p>Uses a public CORS proxy — actually works on any site.</p>
<input id="domain" value="hbpd.org" size="30">
<button id="scan">Scan</button>
<div id="log" class="log">Ready.</div>
<div id="results"></div>

<script>
  const proxy = 'https://corsproxy.io/?';
  const adminPaths = ['/admin','/cpanel','/webmail','/login','/wp-admin','/backup','/.env','/phpmyadmin','/server-status','/logs'];

  async function check(url) {
    try {
      const resp = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
      return { url, status: resp.status, ok: resp.ok };
    } catch(e) {
      return { url, status: 0, ok: false };
    }
  }

  document.getElementById('scan').onclick = async function() {
    const domain = document.getElementById('domain').value.trim();
    if (!domain) return;
    const log = document.getElementById('log');
    const results = document.getElementById('results');
    log.textContent = 'Scanning ' + domain + '...\n';
    results.innerHTML = '';

    const base = 'https://' + domain;
    // Test main page
    const main = await check(base);
    log.textContent += 'Main: ' + (main.ok ? 'LIVE ('+main.status+')' : 'DEAD') + '\n';
    if (!main.ok) {
      // try http
      const httpBase = 'http://' + domain;
      const mainHttp = await check(httpBase);
      log.textContent += 'HTTP fallback: ' + (mainHttp.ok ? 'LIVE ('+mainHttp.status+')' : 'DEAD') + '\n';
      if (!mainHttp.ok) { log.textContent += 'Domain unreachable.'; return; }
    }

    // Check paths
    const found = [];
    for (const path of adminPaths) {
      const full = base + path;
      const res = await check(full);
      if (res.ok && res.status < 400) {
        found.push(path + ' (' + res.status + ')');
        log.textContent += 'FOUND: ' + path + '\n';
      } else {
        log.textContent += '  ' + path + ' -> ' + (res.status || 'ERR') + '\n';
      }
      await new Promise(r => setTimeout(r, 300));
    }

    // Render
    let html = '<div class="card"><span class="live">✓ ' + domain + ' reachable</span></div>';
    if (found.length) {
      html += '<div class="card"><b>Exposed paths:</b> ' + found.join(', ') + '</div>';
    } else {
      html += '<div class="card">No common admin paths found.</div>';
    }
    results.innerHTML = html;
    log.textContent += 'Done.';
  };
</script>
</body>
</html>
